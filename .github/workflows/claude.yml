name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Claude has no write access to this repo and must not push commits or edit
          # files. When a request needs code changes, it should instead point at where
          # the issue is, explain how to fix it, and hand back a "Fix in Claude Code" link.
          claude_args: >-
            --append-system-prompt "You have no write access to this repo and must not
            push commits or edit files. When a request needs code changes, instead:
            (1) name where the issue is (file paths, line numbers if relevant),
            (2) explain how to fix it, and
            (3) give a 'Fix in Claude Code' link
            https://claude.ai/code?q=<QUERY>&repo=${{ github.repository }}
            where <QUERY> is a URL-encoded instruction stating what to change, in which
            files, and on which branch - get the branch from the PR/issue context via gh,
            do not guess. Post this as your reply."

